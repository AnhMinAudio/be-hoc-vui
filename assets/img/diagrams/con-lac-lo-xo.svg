<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 240" font-family="Arial, sans-serif">
  <title>Con lắc lò xo treo thẳng đứng</title>
  <!-- Trần -->
  <rect x="40" y="20" width="220" height="14" fill="#90A4AE"/>
  <line x1="40" y1="34" x2="48" y2="46" stroke="#546E7A" stroke-width="1.2"/>
  <line x1="60" y1="34" x2="68" y2="46" stroke="#546E7A" stroke-width="1.2"/>
  <line x1="80" y1="34" x2="88" y2="46" stroke="#546E7A" stroke-width="1.2"/>
  <line x1="100" y1="34" x2="108" y2="46" stroke="#546E7A" stroke-width="1.2"/>
  <line x1="120" y1="34" x2="128" y2="46" stroke="#546E7A" stroke-width="1.2"/>
  <line x1="140" y1="34" x2="148" y2="46" stroke="#546E7A" stroke-width="1.2"/>
  <line x1="160" y1="34" x2="168" y2="46" stroke="#546E7A" stroke-width="1.2"/>
  <line x1="180" y1="34" x2="188" y2="46" stroke="#546E7A" stroke-width="1.2"/>
  <line x1="200" y1="34" x2="208" y2="46" stroke="#546E7A" stroke-width="1.2"/>
  <line x1="220" y1="34" x2="228" y2="46" stroke="#546E7A" stroke-width="1.2"/>
  <line x1="240" y1="34" x2="248" y2="46" stroke="#546E7A" stroke-width="1.2"/>
  <!-- Lò xo (zigzag) -->
  <polyline points="150,34 138,50 162,60 138,72 162,82 138,94 162,104 138,116 162,126 150,138"
            fill="none" stroke="#1565C0" stroke-width="2.5"/>
  <!-- Vật nặng -->
  <rect x="125" y="138" width="50" height="50" rx="6" fill="#FFB74D" stroke="#E65100" stroke-width="2"/>
  <text x="150" y="170" text-anchor="middle" font-size="22" fill="#fff" font-weight="800">m</text>
  <!-- Mũi tên dao động -->
  <path d="M195 163 L215 163 M210 158 L215 163 L210 168" stroke="#C62828" stroke-width="2" fill="none"/>
  <path d="M85 163 L105 163 M90 158 L85 163 L90 168" stroke="#C62828" stroke-width="2" fill="none"/>
  <text x="220" y="200" text-anchor="middle" font-size="11" fill="#C62828" font-weight="700">dao động</text>
  <!-- Nhãn -->
  <text x="100" y="90" text-anchor="middle" font-size="14" fill="#1565C0" font-weight="700">k</text>
</svg>
