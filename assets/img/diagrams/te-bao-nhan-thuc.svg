<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" font-family="Arial, sans-serif">
  <title>Sơ đồ cấu trúc tế bào nhân thực</title>
  <!-- Màng tế bào -->
  <ellipse cx="200" cy="140" rx="180" ry="120" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2.5"/>
  <!-- Nhân -->
  <circle cx="170" cy="130" r="45" fill="#FFCDD2" stroke="#C62828" stroke-width="2"/>
  <circle cx="170" cy="130" r="12" fill="#C62828" opacity="0.6"/>
  <text x="170" y="135" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">Nhân</text>
  <!-- Ti thể -->
  <ellipse cx="280" cy="90" rx="28" ry="14" fill="#FFE0B2" stroke="#E65100" stroke-width="1.5"/>
  <path d="M256 90 Q268 84 280 90 Q292 96 304 90" fill="none" stroke="#E65100" stroke-width="1" opacity="0.6"/>
  <text x="280" y="76" text-anchor="middle" font-size="10" fill="#E65100" font-weight="700">Ti thể</text>
  <!-- Lục lạp (giả sử tế bào thực vật để minh họa) -->
  <ellipse cx="300" cy="180" rx="30" ry="16" fill="#C8E6C9" stroke="#1B5E20" stroke-width="1.5"/>
  <circle cx="290" cy="180" r="3" fill="#1B5E20"/>
  <circle cx="305" cy="180" r="3" fill="#1B5E20"/>
  <circle cx="298" cy="174" r="3" fill="#1B5E20"/>
  <text x="300" y="208" text-anchor="middle" font-size="10" fill="#1B5E20" font-weight="700">Lục lạp</text>
  <!-- Ribosome -->
  <circle cx="100" cy="190" r="4" fill="#7B1FA2"/>
  <circle cx="110" cy="200" r="4" fill="#7B1FA2"/>
  <circle cx="92" cy="205" r="4" fill="#7B1FA2"/>
  <text x="100" y="225" text-anchor="middle" font-size="10" fill="#7B1FA2" font-weight="700">Ribosome</text>
  <!-- Lưới nội chất -->
  <path d="M90 110 Q120 100 140 110 Q120 122 90 116 Z" fill="#B3E5FC" stroke="#0277BD" stroke-width="1.2"/>
  <text x="115" y="98" text-anchor="middle" font-size="10" fill="#0277BD" font-weight="700">Lưới nội chất</text>
  <!-- Bộ máy Golgi -->
  <path d="M220 210 Q235 205 250 210" fill="none" stroke="#6A1B9A" stroke-width="2"/>
  <path d="M220 218 Q235 213 250 218" fill="none" stroke="#6A1B9A" stroke-width="2"/>
  <path d="M220 226 Q235 221 250 226" fill="none" stroke="#6A1B9A" stroke-width="2"/>
  <text x="235" y="245" text-anchor="middle" font-size="10" fill="#6A1B9A" font-weight="700">Golgi</text>
  <!-- Nhãn màng tế bào -->
  <text x="200" y="20" text-anchor="middle" font-size="11" fill="#2E7D32" font-weight="700">Màng tế bào</text>
  <line x1="200" y1="24" x2="200" y2="38" stroke="#2E7D32" stroke-width="1"/>
</svg>
