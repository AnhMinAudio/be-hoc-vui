  <text x="160" y="38" text-anchor="middle" font-size="13" font-weight="700" fill="#0D47A1">r</text>
  <text x="160" y="168" text-anchor="middle" font-size="15" font-weight="700" fill="#37474F">F = k·q₁q₂ / r²</text>
